<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mettamoney 3D Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    overflow: hidden;
    color: white;
}

/* BACKGROUND PARTICLES */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* SPLIT */
.main {
    display: flex;
    height: 100vh;
}

/* LEFT SIDE */
.left {
    width: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
}

.left h1 {
    font-size: 50px;
    background: linear-gradient(to right, cyan, white);
    -webkit-background-clip: text;
    color: transparent;
}

.left p {
    font-size: 18px;
    opacity: 0.8;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
}

/* 3D LOGIN CARD */
.login-box {
    width: 340px;
    padding: 35px;
    border-radius: 15px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    transform-style: preserve-3d;
    transition: 0.3s;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

/* 3D HOVER */
.login-box:hover {
    transform: rotateY(10deg) rotateX(5deg) scale(1.03);
}

/* TITLE */
.login-box h2 {
    text-align: center;
    margin-bottom: 15px;
}

/* INPUT */
.login-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BUTTON */
.login-box button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, cyan, blue);
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.login-box button:hover {
    transform: scale(1.05);
}

/* LINKS */
.links {
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
}

.links a {
    color: cyan;
    text-decoration: none;
}

/* ERROR */
.error {
    background: rgba(255,0,0,0.7);
    padding: 8px;
    border-radius: 6px;
    margin-bottom: 10px;
}

/* SECURITY */
.security {
    margin-top: 15px;
    font-size: 13px;
    text-align: center;
    opacity: 0.8;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="main">

    <!-- LEFT -->
    <div class="left">
        <div>
            <h1>Mettamoney</h1>
            <p>Next-Gen Digital Payment Platform</p>
            <p>Fast • Secure • Intelligent</p>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="login-box" id="card">

            <h2>Login</h2>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input type="email" name="email" placeholder="Enter Email" required>
                <input type="password" name="password" placeholder="Enter Password" required>
                <button type="submit">Login</button>
            </form>

            <div class="links">
                <a href="/forgot-password">Forgot Password?</a>
            </div>

            <div class="links">
                Don't have an account? <a href="/signup">Sign Up</a>
            </div>

            <div class="security">
                🔒 Your data is encrypted and सुरक्षित
            </div>

        </div>
    </div>

</div>

<script>
/* 3D MOUSE MOVE EFFECT */
const card = document.getElementById("card");

document.addEventListener("mousemove", (e) => {
    let x = (window.innerWidth / 2 - e.pageX) / 25;
    let y = (window.innerHeight / 2 - e.pageY) / 25;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* PARTICLE BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        d: Math.random() * 1
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    });

    update();
}

function update() {
    particles.forEach(p => {
        p.y += p.d;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });
}

setInterval(draw, 33);
</script>

</body>
</html>
